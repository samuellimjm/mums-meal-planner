    async function fetchNewMeals(slots, everCookedNames, currentNames) {
      const avoid = [...new Set([...everCookedNames, ...currentNames])];
      const slotsDesc = slots.map(s=>`${s.type} (Day ${s.day}, replace "${s.name}")`).join("; ");
      const prompt = `You are a nutrition expert. Generate ${slots.length} replacement meal(s) for a high-protein, low-calorie plan for 2 people.\n\nSlots to fill: ${slotsDesc}\n\nNEVER use any of these dishes: ${avoid.join(", ")}\n\nRules per meal:\n- High protein 25-46g per serving\n- Low calorie 220-460 calories per serving\n- Easy to cook (under 40 min)\n- Mix of Western and Asian cuisines\n- Totally new dish\n\nRespond ONLY with a JSON array (no markdown, no backticks):\n[\n  {\n    "slotId": "<original id>",\n    "name": "Dish Name",\n    "cuisine": "western or asian",\n    "calories": 350,\n    "protein": 35,\n    "ingredients": [{"name":"ingredient","amount":200,"unit":"g"}],\n    "instructions": "2-3 sentence cooking instructions."\n  }\n]`;
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:2000, messages:[{role:"user",content:prompt}] })
      });
      const data = await res.json();
      const text = data.content.map(i=>i.text||"").join("");
      return JSON.parse(text.replace(/```json|```/g,"").trim());
    }

      return React.createElement("div",{style:{marginBottom:18}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
          React.createElement("div",{style:{background:allDone?"#2d6a55":"#2c2420",color:allDone?"#d1ede5":"#fdf8ef",borderRadius:10,padding:"3px 12px",fontFamily:"'Lato',sans-serif",fontWeight:700,fontSize:12,minWidth:86,textAlign:"center"}},`${allDone?"✓ ":""}${label} · D${day}`),
          React.createElement("div",{style:{flex:1,height:1,background:"#ede6d8"}})
        ),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:10}},
          MEAL_TYPES.map(t=>{ const m=dayMeals.find(x=>x.type===t); return m?React.createElement(MealCard,{key:m.id,meal:m,...rest}):null; })
        )
      );
    }

    function ListView({meals,weekDays,...rest}){
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        MEAL_TYPES.map(type=>React.createElement("div",{key:type},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,margin:"14px 0 8px"}},
            React.createElement("div",{style:{background:"#2c2420",color:"#fdf8ef",padding:"3px 14px",borderRadius:10,fontSize:12,fontFamily:"'Lato',sans-serif",fontWeight:700}},`${MEAL_ICONS[type]} ${type.charAt(0).toUpperCase()+type.slice(1)}`),
            React.createElement("div",{style:{flex:1,height:1,background:"#ede6d8"}})
          ),
          weekDays.map(day=>{
            const m=meals.find(x=>x.day===day&&x.type===type); if(!m) return null;
            const dl=DAY_NAMES[(day-1)%7];
            return React.createElement("div",{key:m.id,style:{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8}},
              React.createElement("div",{style:{minWidth:46,paddingTop:13,textAlign:"center",fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:"#a09080"}},
                React.createElement("div",null,dl),React.createElement("div",{style:{color:"#c9a96e",fontSize:10}},`D${day}`)
              ),
              React.createElement("div",{style:{flex:1}},React.createElement(MealCard,{meal:m,...rest}))
            );
          })
        ))
      );
    }

    function MealCard({meal,expandedId,setExpandedId,toggleCooked,regenOne,refreshing,updateIngredient,adjustServings,editingKey,setEditingKey}){
      const isExp=expandedId===meal.id, isRegen=refreshing===meal.id;
      const badge=meal.cuisine==="western"?{bg:"#d1ede5",c:"#2d6a55"}:{bg:"#fde8c8",c:"#8b4513"};
      return React.createElement("div",{className:`card ${meal.cooked?"cooked-card":""}`,style:{background:"#fff",border:`1.5px solid ${meal.cooked?"#a8d5c5":"#ede6d8"}`,boxShadow:"0 4px 18px rgba(44,36,32,.06)",position:"relative"}},
        meal.regenerated&&!meal.cooked&&React.createElement("div",{style:{position:"absolute",top:7,right:7,background:"#e8f4ff",color:"#2563eb",fontSize:9,padding:"2px 7px",borderRadius:5,fontFamily:"'Lato',sans-serif",fontWeight:700,zIndex:1}},"AI NEW"),
        React.createElement("div",{onClick:()=>setExpandedId(isExp?null:meal.id),style:{padding:"12px 14px 8px",cursor:"pointer"}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
            React.createElement("div",{style:{display:"flex",gap:5,alignItems:"center"}},
              React.createElement("span",{style:{fontSize:14}},MEAL_ICONS[meal.type]),
              React.createElement("span",{style:{fontSize:10,textTransform:"uppercase",letterSpacing:".12em",color:"#a09080",fontFamily:"'Lato',sans-serif",fontWeight:700}},meal.type)
            ),
            React.createElement("div",{style:{display:"flex",gap:4,alignItems:"center"}},
              React.createElement("span",{style:{background:badge.bg,color:badge.c,fontSize:9,padding:"2px 7px",borderRadius:5,fontFamily:"'Lato',sans-serif",fontWeight:700}},meal.cuisine==="western"?"🍴 Western":"🥢 Asian"),
              React.createElement("span",{style:{fontSize:12,color:"#a09080",marginLeft:3}},isExp?"▲":"▼")
            )
          ),
          React.createElement("h3",{style:{fontSize:"clamp(13px,2.5vw,15px)",fontWeight:600,lineHeight:1.3,marginBottom:6,color:meal.cooked?"#6b8b7a":"#2c2420",textDecoration:meal.cooked?"line-through":"none"}},meal.name),
          React.createElement("div",{style:{display:"flex",gap:10,fontFamily:"'Lato',sans-serif",fontSize:11}},
            React.createElement("span",{style:{color:"#e8926c",fontWeight:700}},`🔥 ${meal.calories} cal`),
            React.createElement("span",{style:{color:"#2d6a55",fontWeight:700}},`💪 ${meal.protein}g`),
            React.createElement("span",{style:{color:"#a09080"}},`👥 ${meal.servings}`)
          )
        ),
        React.createElement("div",{style:{padding:"0 14px 12px",display:"flex",gap:8}},
          React.createElement("button",{className:"btn",onClick:()=>toggleCooked(meal.id),style:{flex:1,padding:"6px 0",borderRadius:10,background:meal.cooked?"#2d6a55":"#f5f0e8",border:`1.5px solid ${meal.cooked?"#2d6a55":"#d4c9b8"}`,color:meal.cooked?"#fff":"#4a3428",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:600,cursor:"pointer"}},meal.cooked?"✓ Cooked!":"Mark Cooked"),
          React.createElement("button",{className:"btn",onClick:()=>regenOne(meal),disabled:isRegen||refreshing==="ALL",style:{padding:"6px 11px",borderRadius:10,background:isRegen?"#e8e0d8":"#fff8ee",border:"1.5px solid #d4c9b8",color:"#8b6914",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:600,cursor:"pointer"}},isRegen?React.createElement("span",{className:"spin"},"⟳"):"↺")
        ),
        isExp&&React.createElement("div",{className:"slide-in",style:{borderTop:"1px solid #ede6d8",padding:14}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12,fontFamily:"'Lato',sans-serif"}},
            React.createElement("span",{style:{fontSize:12,color:"#6b5a4e",fontWeight:600}},"Servings:"),
            [1,2,3,4].map(n=>React.createElement("button",{key:n,className:"btn",onClick:()=>adjustServings(meal.id,n),style:{width:28,height:28,borderRadius:7,background:meal.servings===n?"#2c2420":"#f5f0e8",border:`1.5px solid ${meal.servings===n?"#2c2420":"#d4c9b8"}`,color:meal.servings===n?"#fff":"#4a3428",fontSize:12,fontWeight:600,cursor:"pointer"}},n))
          ),
          React.createElement("div",{style:{marginBottom:12}},
            React.createElement("div",{style:{fontSize:11,fontFamily:"'Lato',sans-serif",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#8b6914",marginBottom:6}},"Ingredients"),
            meal.ingredients.map((ing,i)=>{
              const ek=`${meal.id}-${i}`, isE=editingKey===ek;
              return React.createElement("div",{key:i,onClick:()=>setEditingKey(isE?null:ek),style:{display:"flex",alignItems:"center",gap:6,padding:"4px 5px",borderRadius:7,cursor:"pointer",marginBottom:1,background:isE?"#fdfaf5":"transparent"}},
                React.createElement("span",{style:{fontSize:12,flex:1,fontFamily:"'Lato',sans-serif",color:"#3a2e28"}},ing.name),
                isE
                  ? React.createElement("div",{style:{display:"flex",gap:4},onClick:e=>e.stopPropagation()},
                      React.createElement("input",{type:"number",value:ing.amount,onChange:e=>updateIngredient(meal.id,i,"amount",e.target.value),style:{width:58}}),
                      React.createElement("input",{type:"text",value:ing.unit||"",onChange:e=>updateIngredient(meal.id,i,"unit",e.target.value),style:{width:40}})
                    )
                  : React.createElement("span",{style:{fontSize:11,fontFamily:"'Lato',sans-serif",fontWeight:600,color:"#6b5a4e",background:"#f5f0e8",padding:"2px 7px",borderRadius:5}},`${ing.amount}${ing.unit?" "+ing.unit:""}`)
              );
            }),
            React.createElement("p",{style:{fontSize:10,color:"#a09080",fontFamily:"'Lato',sans-serif",marginTop:4}},"Tap ingredient to edit")
          ),
          React.createElement("div",{style:{fontSize:11,fontFamily:"'Lato',sans-serif",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#8b6914",marginBottom:6}},"Instructions"),
          React.createElement("p",{style:{fontSize:12,fontFamily:"'Lato',sans-serif",lineHeight:1.65,color:"#4a3428",background:"#fdfaf5",padding:"9px 11px",borderRadius:9}},meal.instructions)
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

    // Register service worker
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").then(()=>console.log("SW registered")).catch(()=>{}));
    }
  </script>
</body>
</html>
